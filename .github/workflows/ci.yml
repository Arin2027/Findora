name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  MONGODB_URI: mongodb://127.0.0.1:27017/findora-test
  JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long
  CLIENT_URL: http://localhost:5173
  NODE_ENV: test

jobs:
  server-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm test -- --passWithNoTests

  client-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm test

  client-build:
    runs-on: ubuntu-latest
    needs: [client-test]
    defaults:
      run:
        working-directory: client
    env:
      VITE_API_URL: http://localhost:5001
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [server-test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f docker/Dockerfile.api -t findora-api .
